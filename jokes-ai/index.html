<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jokes AI — Powered by Wahab AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='16' fill='%230A0A0A'/><text y='46' x='8' font-size='44' font-family='serif'>🎤</text></svg>">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo-wrap">
      <span class="logo-emoji">🎤</span>
      <div class="logo-text">
        <h1 class="logo-name">JOKES AI</h1>
        <p class="logo-sub">powered by Wahab AI · made by Abdul Wahab</p>
      </div>
    </div>
  </header>

  <!-- MAIN STAGE -->
  <main class="stage-wrap">

    <!-- spotlight + mic -->
    <div class="stage" id="stage">
      <div class="spotlight" id="spotlight"></div>

      <button class="mic-btn" id="micBtn" aria-label="Talk to Trump AI">
        <!-- mic icon -->
        <svg class="mic-icon" id="micIcon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="17" y="4" width="14" height="22" rx="7" fill="currentColor"/>
          <path d="M10 24c0 7.732 6.268 14 14 14s14-6.268 14-14" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <line x1="24" y1="38" x2="24" y2="44" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <line x1="16" y1="44" x2="32" y2="44" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <!-- stop icon (shown while recording) -->
        <svg class="stop-icon" id="stopIcon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
          <rect x="12" y="12" width="24" height="24" rx="4" fill="currentColor"/>
        </svg>
        <!-- wave icon (shown while AI speaking) -->
        <svg class="wave-icon" id="waveIcon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
          <rect x="6"  y="18" width="5" height="12" rx="2.5" fill="currentColor"/>
          <rect x="14" y="10" width="5" height="28" rx="2.5" fill="currentColor"/>
          <rect x="22" y="14" width="5" height="20" rx="2.5" fill="currentColor"/>
          <rect x="30" y="8"  width="5" height="32" rx="2.5" fill="currentColor"/>
          <rect x="38" y="16" width="5" height="16" rx="2.5" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <!-- status line -->
    <p class="status-line" id="statusLine">Tap the mic — Trump is ready to make you laugh 😂</p>

    <!-- text fallback -->
    <div class="text-row" id="textRow">
      <input type="text" class="text-input" id="textInput" placeholder="Ya type bhi kar sakte ho..." autocomplete="off">
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- chat bubbles -->
    <div class="bubbles" id="bubbles"></div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Jokes AI powered by Wahab AI &nbsp;·&nbsp; No login needed &nbsp;·&nbsp; Speak any language 🌍</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
